apiVersion: v1
kind: ConfigMap
metadata:
  name: hello-app-config
data:
  DB_URL: "jdbc:postgresql://postgres-service:5432/hellodb"
  DB_USERNAME: "postgres"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-spring
  labels:
    app: hello-spring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello-spring
  template:
    metadata:
      labels:
        app: hello-spring
    spec:
      containers:
        - name: hello-spring
          image: catninjauser/helloapps-java:1.1.0
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: DB_URL
              valueFrom:
                configMapKeyRef:
                  name: hello-app-config
                  key: DB_URL
            - name: DB_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: hello-app-config
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"

          # ============================================================
          # STARTUP PROBE
          # ============================================================
          # Purpose: Give app time to initialize (JVM warmup)
          # Checks: Is the app responding to HTTP?
          # On failure: Keep waiting until failureThreshold reached
          # Config: 30 attempts × 10s = 5 minutes max startup time
          # ============================================================
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
            successThreshold: 1

          # ============================================================
          # LIVENESS PROBE
          # ============================================================
          # Purpose: Detect if app is stuck/deadlocked
          # Checks: Is the app thread responsive? (NO dependency checks!)
          # On failure: RESTART the container
          # ============================================================
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1

          # ============================================================
          # READINESS PROBE
          # ============================================================
          # Purpose: Control traffic routing based on dependency health
          # Checks: Is DB connected?
          # On failure: Remove pod from Service endpoints (NO traffic)
          # ============================================================
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 0
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1
---
apiVersion: v1
kind: Service
metadata:
  name: hello-spring-service
spec:
  selector:
    app: hello-spring
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 32000
      name: http
  type: NodePort
